{{define "archive.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1337b04rd — Archive</title>
    <style>
        body {
            background-color: #E6E9F5;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header, footer {
            text-align: center;
            padding: 10px 0;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: blue;
        }
        nav a:hover { text-decoration: underline; }
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            list-style: none;
            margin: 0;
        }
        .post {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .post a {
            text-decoration: none;
            color: inherit;
        }
        .post img {
            max-width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
        }
        .post-title {
            font-size: 1em;
            margin: 8px 0 0;
            word-break: break-word;
        }
        .archived-badge {
            font-size: 0.75em;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<header>
    <h1>1337b04rd</h1>
    <h2>Archive</h2>
    <nav>
        [<a href="/">Catalog</a>] |
        [<a href="/create-post">Create Post</a>]
    </nav>
</header>
<main>
    <ul class="post-grid">
        {{range .}}
        <li class="post">
            <a href="/archive/{{.ID}}">
                {{if .ImageURL}}
                <img src="{{.ImageURL}}" alt="post image">
                {{else}}
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2RkZCIvPjx0ZXh0IHg9IjUwIiB5PSI1NSIgZm9udC1zaXplPSIxNCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzk5OSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+" alt="no image">
                {{end}}
                <p class="post-title">{{.Title}}</p>
                {{if eq .Status "archived"}}
                <p class="archived-badge">[archived]</p>
                {{end}}
            </a>
        </li>
        {{else}}
        <li style="grid-column:1/-1;text-align:center;padding:40px 0;">Archive is empty.</li>
        {{end}}
    </ul>
</main>
</body>
</html>
{{end}}
