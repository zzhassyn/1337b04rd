{{define "catalog.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1337b04rd — Catalog</title>
    <style>
        body {
            background-color: #E6E9F5;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header, footer {
            text-align: center;
            padding: 10px 0;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: blue;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .posts .list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .post {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            width: 15%;
            margin: 10px;
            display: flex;
            flex-direction: column;
        }
        .post a {
            text-decoration: none;
            color: inherit;
        }
        .post img {
            max-width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
        }
        .post h3 {
            font-size: 0.9em;
            margin: 8px 0 0;
            word-break: break-word;
        }
    </style>
</head>
<body>
<header>
    <h1>1337b04rd</h1>
    <h2>Catalog</h2>
    <nav>
        [<a href="/create-post">Create Post</a>] |
        [<a href="/archive">Archive</a>]
    </nav>
</header>
<main>
    <section class="posts">
        <ul class="list">
            {{range .}}
            <li class="post">
                <a href="/post/{{.ID}}">
                    {{if .ImageURL}}
                    <img src="{{.ImageURL}}" alt="post image">
                    {{else}}
                    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2RkZCIvPjx0ZXh0IHg9IjUwIiB5PSI1NSIgZm9udC1zaXplPSIxNCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzk5OSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+" alt="no image">
                    {{end}}
                    <h3>{{.Title}}</h3>
                </a>
            </li>
            {{else}}
            <li style="text-align:center;width:100%;padding:40px 0;">No posts yet. <a href="/create-post">Create the first one!</a></li>
            {{end}}
        </ul>
    </section>
</main>
</body>
</html>
{{end}}
